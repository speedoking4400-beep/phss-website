<!DOCTYPE html>
<html>
<head>
<title>PHSS Udaipura - Results</title>
<style>
body{font-family:Arial;text-align:center;padding:50px;background:#f4f6f9;}
h1{color:#0b3d91;}
input{padding:10px;margin:10px;}
button{padding:10px 20px;background:#0b3d91;color:white;border:none;}
</style>
</head>
<body>

<h1>Check Examination Result</h1>

<input type="text" id="roll" placeholder="Enter Roll Number">
<br>
<button onclick="checkResult()">Check Result</button>

<p id="result"></p>

<script>
function checkResult(){
let roll=document.getElementById("roll").value;
if(roll=="123"){
document.getElementById("result").innerHTML="Result: PASS (75%)";
}else{
document.getElementById("result").innerHTML="No Record Found";
}
}
</script>

</body>
</html>
